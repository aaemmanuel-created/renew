<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="RENEW — Speak the Word, renew your mind. Joshua 1:8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RENEW" />
    <link rel="manifest" href="/renew/manifest.json" />
    <link rel="apple-touch-icon" href="/renew/icon-192.png" />
    <title>RENEW</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      /* iPhone Safari: 100vh includes area behind toolbar. Use dvh with fallbacks. */
      #root {
        width: 100%;
        overflow: hidden;
        background: #000;
        height: 100vh;
        height: 100dvh;
        height: -webkit-fill-available;
      }
      @supports (height: 100dvh) {
        #root { height: 100dvh; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Fix 2: Inline cache-buster — runs BEFORE React loads -->
    <!-- Breaks the iOS PWA caching cycle by killing stale service workers -->
    <!-- and clearing orphaned caches before any bundled JS executes -->
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        if (window.caches) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
